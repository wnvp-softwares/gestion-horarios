<div class="vista-generacion">

    <div class="barra-herramientas">
        <div>
            <h2 class="titulo-seccion">Generador de Horarios</h2>
            <p class="texto-secundario" style="margin-top: 0.25rem;">Motor de asignación de clases y validación de conflictos</p>
        </div>

        <div class="acciones-herramientas">
            <button id="btn-generar-automatico" class="boton-base boton-primario" style="width: auto;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem;">
                    <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
                    <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
                </svg>
                Generar Automáticamente
            </button>
        </div>
    </div>

    <div class="tarjeta" style="padding: 1.5rem;">

        <div class="controles-generador">
            <div class="grupo-pestanas">
                <button class="pestana activa" data-vista="grupo">Vista Grupo</button>
                <button class="pestana" disabled style="opacity: 0.5; cursor: not-allowed;" title="Próximamente">Vista Docente</button>
                <button class="pestana" disabled style="opacity: 0.5; cursor: not-allowed;" title="Próximamente">Vista Aula</button>
            </div>
            
            <div class="filtros-generador">
                <svg class="icono-filtro" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                </svg>
                
                <select id="selector-grupo-generador" class="input-estandar" style="min-width: 220px; font-weight: 500;">
                    <option value="">Cargando grupos...</option>
                </select>
                
                <button class="boton-icono-borde" id="btn-grupo-anterior" title="Grupo Anterior">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <button class="boton-icono-borde" id="btn-grupo-siguiente" title="Grupo Siguiente">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
        </div>

        <div id="alerta-conflictos-generador" class="alerta-peligro" style="display: none; margin-bottom: 1.5rem;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            <div style="flex: 1;">
                <h4 class="titulo-alerta-peligro" id="alerta-generador-titulo">Se encontraron conflictos</h4>
                <p class="texto-alerta-peligro" id="alerta-generador-texto">Hay docentes asignados en dos grupos a la misma hora.</p>
            </div>
            <button id="btn-ocultar-alerta" class="boton-base boton-peligro-borde">Ocultar</button>
        </div>

        <div class="contenedor-tabla-generador">
            <table class="tabla-generador">
                <thead>
                    <tr>
                        <th style="width: 10%;">HORA</th>
                        <th style="width: 18%;">LUNES</th>
                        <th style="width: 18%;">MARTES</th>
                        <th style="width: 18%;">MIÉRCOLES</th>
                        <th style="width: 18%;">JUEVES</th>
                        <th style="width: 18%;">VIERNES</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla-generador">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 4rem; color: #6b7280;">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; opacity: 0.5;">
                                <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>
                            </svg>
                            <p style="font-size: 1.1rem;">Selecciona un Grupo para comenzar</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
