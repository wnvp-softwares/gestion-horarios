<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Horarios</title>

    <link rel="stylesheet" href="../styles/index.css">
</head>

<body>
    <div class="contenedor-principal centrado-absoluto">
        <div class="carta-login-contenedor">
            <div class="tarjeta carta-login">
                <header class="cabecera-login">
                    <div class="contenedor-icono-app">
                        <svg class="icono-app" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="24" height="24" rx="6" fill="#2563EB" />
                            <path
                                d="M19 4H18V2H16V4H8V2H6V4H5C3.89 4 3.01 4.9 3.01 6L3 20C3 21.1 3.89 22 5 22H19C20.1 22 21 21.1 21 20V6C21 4.9 20.1 4 19 4ZM19 20H5V10H19V20ZM19 8H5V6H19V8ZM12 13H17V18H12V13Z"
                                fill="white" />
                        </svg>
                    </div>
                    <h1 class="titulo-login">Sistema de Horarios</h1>
                    <p class="subtitulo-login texto-secundario">Ingresa tus credenciales para continuar</p>
                </header>
                <div id="error-mensaje" class="mensaje-alerta alerta-error oculto">
                    <svg class="icono-alerta" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM13 17H11V15H13V17ZM13 13H11V7H13V13Z"
                            fill="currentColor" />
                    </svg>
                    <div>
                        <strong>Credenciales incorrectas.</strong> Por favor, verifica tu información.
                    </div>
                </div>

                <form id="formulario-login">

                    <div class="grupo-formulario">
                        <label for="usuario" class="etiqueta-formulario">Usuario o Correo</label>
                        <div class="contenedor-input-icono">
                            <svg class="icono-input-izq" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 18H4V8L12 13L20 8V18ZM12 11L4 6H20L12 11Z"
                                    fill="currentColor" />
                            </svg>
                            <input type="text" id="usuario" name="usuario" class="input-estandar"
                                placeholder="admin@escuela.edu">
                        </div>
                    </div>

                    <div class="grupo-formulario">
                        <label for="contrasena" class="etiqueta-formulario">Contraseña</label>
                        <div class="contenedor-input-icono">
                            <svg class="icono-input-izq" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M18 8H17V6C17 3.24 14.76 1 12 1C9.24 1 7 3.24 7 6V8H6C4.9 8 4 8.9 4 10V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V10C20 8.9 19.1 8 18 8ZM9 6C9 4.34 10.34 3 12 3C13.66 3 15 4.34 15 6V8H9V6ZM18 20H6V10H18V20ZM12 17C13.1 17 14 16.1 14 15C14 13.9 13.1 13 12 13C10.9 13 10 13.9 10 15C10 16.1 10.9 17 12 17Z"
                                    fill="currentColor" />
                            </svg>
                            <input type="password" id="contrasena" name="contrasena" class="input-estandar"
                                placeholder="••••••••••••">
                        </div>
                    </div>

                    <div class="fila-opciones-login">
                        <div></div>
                        <a href="#" class="enlace-simple">¿Olvidaste tu contraseña?</a>
                    </div>

                    <div class="contenedor-boton-submit">
                        <button type="submit" id="boton-iniciar-sesion" class="boton-base boton-primario">Iniciar
                            sesión</button>
                    </div>
                </form>
            </div>

            <footer class="pie-pagina-login texto-secundario">
                © 2026 Sistema de Horarios Docentes v1.0.0
            </footer>
        </div>
    </div>

    <style>
        .carta-login-contenedor {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .carta-login {
            border-radius: 1rem;
            min-height: 680px;
            padding: 4rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .cabecera-login {
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contenedor-icono-app {
            width: 60px;
            height: 60px;
            margin-bottom: 1rem;
        }

        .icono-app {
            width: 100%;
            height: 100%;
        }

        .titulo-login {
            font-size: var(--tamano-fuente-titulo);
            color: var(--color-negro);
            margin-bottom: 0.5rem;
        }

        .subtitulo-login {
            font-size: var(--tamano-fuente-subtitulo);
        }

        .fila-opciones-login {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -0.5rem;
            /* Ajuste para subir el enlace */
            margin-bottom: 1.5rem;
        }

        .contenedor-boton-submit {
            margin-top: 1rem;
        }

        .pie-pagina-login {
            margin-top: 1.5rem;
            text-align: center;
            width: 100%;
        }

        /* Ajustes Mobile específicos para esta tarjeta */
        @media (max-width: 767px) {
            .carta-login-contenedor {
                max-width: 100%;
            }

            .carta-login {
                padding: 3rem 1.5rem;
            }
        }
    </style>

    <script src="../scripts/admin.js"></script>

</body>

</html>
