<div class="vista-periodos">

    <div class="barra-herramientas">
        <h2 class="titulo-seccion">Periodos Escolares</h2>
    </div>

    <div class="grid-periodos">

        <div class="tarjeta-formulario">
            <div class="cabecera-formulario-periodo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span>Nuevo Periodo</span>
            </div>

            <form id="formulario-periodo">
                <div class="grupo-formulario">
                    <label for="nombre-periodo" class="etiqueta-formulario">Nombre del Periodo</label>
                    <input type="text" id="nombre-periodo" class="input-estandar" style="padding-left: 1rem;"
                        placeholder="Ej. Semestre Ago - Dic 2026" required>
                </div>

                <div class="grupo-formulario">
                    <label for="fecha-inicio" class="etiqueta-formulario">Fecha de Inicio</label>
                    <input type="text" id="fecha-inicio" class="input-estandar" style="padding-left: 1rem;"
                        placeholder="dd/mm/aaaa" required>
                </div>

                <div class="grupo-formulario" style="margin-bottom: 1.5rem;">
                    <label for="fecha-fin" class="etiqueta-formulario">Fecha de Fin</label>
                    <input type="text" id="fecha-fin" class="input-estandar" style="padding-left: 1rem;"
                        placeholder="dd/mm/aaaa" required>
                </div>

                <button type="submit" class="boton-base boton-primario">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem;">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Guardar Periodo
                </button>
            </form>
        </div>

        <div class="lista-periodos">

            <div class="tarjeta-periodo activo">
                <div class="contenido-izquierdo-periodo">
                    <div class="icono-periodo">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </div>
                    <div class="info-periodo">
                        <div class="cabecera-info-periodo">
                            <span class="titulo-periodo">Semestre Enero - Junio 2026</span>
                            <span class="etiqueta-periodo-activo">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                ACTIVO
                            </span>
                        </div>
                        <div class="meta-periodo">
                            <div class="item-meta-periodo">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                <span>Inicio: 12 Ene 2026</span>
                            </div>
                            <div class="item-meta-periodo">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                <span>Fin: 15 Jun 2026</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="acciones-periodo">
                    <button class="boton-base boton-secundario">Editar</button>
                </div>
            </div>

            <div class="tarjeta-periodo">
                <div class="contenido-izquierdo-periodo">
                    <div class="icono-periodo">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </div>
                    <div class="info-periodo">
                        <div class="cabecera-info-periodo">
                            <span class="titulo-periodo">Semestre Agosto - Diciembre 2025</span>
                        </div>
                        <div class="meta-periodo">
                            <div class="item-meta-periodo">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                <span>Inicio: 18 Ago 2025</span>
                            </div>
                            <div class="item-meta-periodo">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                <span>Fin: 10 Dic 2025</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="acciones-periodo">
                    <button class="boton-base boton-secundario">Editar</button>
                    <button class="boton-base boton-primario" style="width: auto;">Establecer Activo</button>
                </div>
            </div>

            <div class="tarjeta-periodo">
                <div class="contenido-izquierdo-periodo">
                    <div class="icono-periodo">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </div>
                    <div class="info-periodo">
                        <div class="cabecera-info-periodo">
                            <span class="titulo-periodo">Semestre Enero - Junio 2025</span>
                        </div>
                        <div class="meta-periodo">
                            <div class="item-meta-periodo">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                <span>Inicio: 15 Ene 2025</span>
                            </div>
                            <div class="item-meta-periodo">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                <span>Fin: 18 Jun 2025</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="acciones-periodo">
                    <button class="boton-base boton-secundario">Editar</button>
                    <button class="boton-base boton-primario" style="width: auto;">Establecer Activo</button>
                </div>
            </div>

        </div>
    </div>
</div>
